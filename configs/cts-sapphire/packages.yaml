packages:
  intel-oneapi-compilers:
    externals:
    - spec: intel-oneapi-compilers@2025.3.0 languages:='c,c++,fortran'
      prefix: /projects/global/toss4/compilers/intel/intel_2025/oneapi
      extra_attributes:
        compilers:
          c: /projects/global/toss4/compilers/intel/intel_2025/oneapi/compiler/2025.3/bin/icx
          cxx: /projects/global/toss4/compilers/intel/intel_2025/oneapi/compiler/2025.3/bin/icpx
          fortran: /projects/global/toss4/compilers/intel/intel_2025/oneapi/compiler/2025.3/bin/ifx
        flags:
          cflags: '-fPIC '
          cxxflags: '-fPIC '
          fflags: '-fPIC -cpp '
      modules:
      - oneapi/2025.3.0
  gcc:
    externals:
    - spec: gcc@14.2.1 languages:='c,c++,fortran'
      prefix: /opt/rh/gcc-toolset-14/root/usr
      extra_attributes:
        compilers:
          c: /opt/rh/gcc-toolset-14/root/usr/bin/gcc
          cxx: /opt/rh/gcc-toolset-14/root/usr/bin/g++
          fortran: /opt/rh/gcc-toolset-14/root/usr/bin/gfortran
        flags:
          cflags: -fPIC
          cxxflags: -fPIC
          fflags: -fPIC -fallow-argument-mismatch
  openmpi:
    externals:
    - spec: openmpi@4.1.8 schedulers=slurm
      prefix: /opt/toss/openmpi/4.1/oneapi
      modules:
      - openmpi-oneapi/4.1
    buildable: false
  python:
    externals:
    - spec: python@3.12.4
      prefix: /projects/aue/hpc/deploy/f9a38d2c/linux-rhel8-x86_64/gcc-12.3.0/python-3.12.4-dln57gx
      modules:
      - aue/python/3.12.4
    buildable: false
  boost:
    require: "@1.80.0"
  parallel-netcdf:
    require: "~fortran"
  netcdf-c:
    require: "+shared build_system=autotools"
  libxml2:
    require: "build_system=autotools"
  mpi:
    require: "openmpi"
  blas:
    require: "netlib-lapack"
  lapack:
    require: "netlib-lapack"
  hdf5:
    require: "~fortran"
  kynema-sgf:
    require: "@main"
    variants: +tiny_profile
  kynema-ugf:
    require: "@main"
  kynema-driver:
    require: "@main"
  c:
    prefer:
    - intel-oneapi-compilers
  cxx:
    prefer:
    - intel-oneapi-compilers
  fortran:
    prefer:
    - intel-oneapi-compilers
  all:
    prefer:
      - "build_type=Release"
      - "target=sapphirerapids"
    conflict:
      - "%gcc"
    permissions:
      write: group
      group: wg-WindHFM
    providers:
      mpi:
      - openmpi
